name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "app/**/*.py"
      - "tests/**/*.py"
      - "requirements.txt"
      - "requirements-dev.txt"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "app/**/*.py"
      - "tests/**/*.py"
      - "requirements.txt"
      - "requirements-dev.txt"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint code
        run: python -m ruff check app tests

      - name: Verify Python files compile
        env:
          MONGODB_URL: mongodb://localhost:27017
          DB_NAME: europe_travel_api_ci
        run: python -m compileall app

      - name: Run tests
        env:
          MONGODB_URL: mongodb://localhost:27017
          DB_NAME: europe_travel_api_ci
        run: pytest
